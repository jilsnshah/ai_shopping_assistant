name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Create Firebase Credentials
        run: |
          echo "${{ secrets.FIREBASE_CREDENTIALS_JSON }}" > firebase-credentials.json
          
      - name: Run Backend API Tests with Coverage
        run: |
          pytest tests/backend/ --cov=app --cov=firebase_db --cov-report=xml
          
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install Backend Dependencies
        run: pip install -r requirements.txt

      - name: Create Firebase Credentials
        run: |
          echo "${{ secrets.FIREBASE_CREDENTIALS_JSON }}" > firebase-credentials.json
          
      - name: Start Backend Server
        run: |
          # Run flask in background
          nohup flask run -p 5002 > backend.log 2>&1 &
          # Wait for backend to be ready
          sleep 5

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci
        
      - name: Install Playwright Browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium
        
      - name: Run Playwright E2E Tests
        working-directory: ./frontend
        run: npx playwright test
        
      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  ai-triage-demo:
    needs: e2e-tests
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install Google Generative AI
        run: pip install google-generativeai
      - name: Run AI Triage
        # Simulating triage of a failed log
        run: |
          echo "Simulated Playwright Error: locator('button').click() Timeout 30000ms exceeded" > failed_log.txt
          python scripts/ai_test_triage.py failed_log.txt
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
